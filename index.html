<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathew Dating Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --beige:       #F5EFE6;
      --beige-dark:  #EAE0D0;
      --beige-mid:   #D9CBBA;
      --brown-light: #B89C82;
      --brown:       #7C5C3E;
      --brown-dark:  #4A3728;
      --white:       #FDFAF6;
      --text:        #3A2A1E;
      --text-muted:  #7C6655;
      --heart:       #C0634E;
    }

    body {
      background: var(--beige);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #game {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      width: 100%;
      max-width: 860px;
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid var(--beige-mid);
      box-shadow: 0 8px 40px rgba(74,55,40,0.13);
      min-height: 580px;
    }

    #leftPanel {
      background: var(--brown-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 1.5rem;
      gap: 1.25rem;
      position: relative;
    }

    #leftPanel h1 {
      font-family: 'Playfair Display', serif;
      color: var(--beige);
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.03em;
      line-height: 1.4;
    }

    #portraitWrap {
      width: 180px;
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      border: 3px solid var(--brown-light);
      background: var(--brown);
      flex-shrink: 0;
    }

    #portrait {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #emotionBadge {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brown-light);
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--brown-light);
      border-radius: 20px;
      padding: 3px 12px;
      min-height: 22px;
    }

    #meterWrap {
      width: 100%;
      margin-top: auto;
    }

    #meterLabel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--beige-mid);
      font-size: 0.78rem;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    #meterLabel span:last-child {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--beige);
    }

    #meterBar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    #meterFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brown-light), #E8B97A);
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    #heartRow {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 6px;
    }

    .heart {
      font-size: 14px;
      color: rgba(255,255,255,0.2);
      transition: color 0.3s;
    }
    .heart.filled { color: var(--heart); }

    #rightPanel {
      display: flex;
      flex-direction: column;
      background: var(--white);
    }

    #chatHeader {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--beige-dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chatHeader .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--brown-light);
    }

    #chatHeader span {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 0;
      max-height: 400px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--beige-mid); border-radius: 99px; }

    .bubble {
      max-width: 75%;
      padding: 0.65rem 1rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text);
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.player {
      background: var(--brown);
      color: var(--white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.mathew {
      background: var(--beige-dark);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.system {
      background: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      align-self: center;
      font-style: italic;
    }

    #reasonText {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 0 1.25rem;
      min-height: 1rem;
    }

    #inputArea {
      display: flex;
      gap: 8px;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--beige-dark);
    }

    #message {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--beige-mid);
      border-radius: 99px;
      background: var(--beige);
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #message::placeholder { color: var(--text-muted); }
    #message:focus { border-color: var(--brown-light); }

    #sendBtn {
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: 99px;
      padding: 0 1.25rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #sendBtn:hover { background: var(--brown-dark); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 620px) {
      #game { grid-template-columns: 1fr; }
      #leftPanel { flex-direction: row; flex-wrap: wrap; justify-content: center; padding: 1rem; }
      #leftPanel h1 { width: 100%; }
      #portraitWrap { width: 120px; height: 130px; }
    }
  </style>
</head>
<body>

<div id="game">
  <div id="leftPanel">
    <h1>Mathew<br>Dating Simulator</h1>

    <div id="portraitWrap">
      <img id="portrait" src="images/default.jpg" alt="Mathew">
    </div>

    <div id="emotionBadge">default</div>

    <div id="meterWrap">
      <div id="meterLabel">
        <span>Affection</span>
        <span id="affectionNum">40 / 100</span>
      </div>
      <div id="meterBar"><div id="meterFill"></div></div>
      <div id="heartRow">
        <span class="heart" id="h1">♥</span>
        <span class="heart" id="h2">♥</span>
        <span class="heart" id="h3">♥</span>
        <span class="heart" id="h4">♥</span>
        <span class="heart" id="h5">♥</span>
      </div>
    </div>
  </div>

  <div id="rightPanel">
    <div id="chatHeader">
      <div class="dot"></div>
      <span>CHATTING WITH MATHEW</span>
    </div>

    <div id="chat">
      <div class="bubble system">Say something to start the conversation...</div>
    </div>

    <div id="reasonText"></div>

    <div id="inputArea">
      <input id="message" type="text" placeholder="Say something to Mathew...">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>


const MAX_HISTORY = 10;


// ===============================
// Browser Game State
// ===============================


function getGameState(){

    const saved =
        localStorage.getItem("mathewState");


    if(saved){

        return JSON.parse(saved);

    }


    return {

        affection:40,

        memories:[],

        history:[]

    };

}



function saveGameState(state){

    localStorage.setItem(
        "mathewState",
        JSON.stringify(state)
    );

}



function resetGame(){

    localStorage.setItem(

        "mathewState",

        JSON.stringify({

            affection:40,

            memories:[],

            history:[]

        })

    );


    location.reload();

}



// ===============================
// History
// ===============================


function addToHistory(user, mathew){


    let state = getGameState();


    state.history.push({

        user:user,

        mathew:mathew

    });



    state.history =
        state.history.slice(-MAX_HISTORY);



    saveGameState(state);

}





// ===============================
// UI
// ===============================


function updateMeter(affection){


    document
    .getElementById("meterFill")
    .style.width =
    affection+"%";



    document
    .getElementById("affectionNum")
    .textContent =
    affection+" / 100";



    const hearts =
    document.querySelectorAll(".heart");



    const filled =
    Math.ceil(
        affection / 100 * 5
    );



    hearts.forEach(
        (h,i)=>{

            h.classList.toggle(
                "filled",
                i < filled
            );

        }
    );

}



function updateEmotion(emotion){


    const badge =
    document.getElementById(
        "emotionBadge"
    );


    const portrait =
    document.getElementById(
        "portrait"
    );


    badge.textContent =
    emotion;



    portrait.src =
    `images/${emotion}.jpg`;



    portrait.onerror=()=>{

        portrait.src =
        "images/default.jpg";

    };


}




function addBubble(text,who){


    const chat =
    document.getElementById(
        "chat"
    );


    const div =
    document.createElement(
        "div"
    );


    div.className =
    `bubble ${who}`;


    div.textContent =
    text;



    chat.appendChild(div);


    chat.scrollTop =
    chat.scrollHeight;

}




function showReason(change,reason){


    const el =
    document.getElementById(
        "reasonText"
    );


    const sign =
    change > 0 ? "+" : "";



    if(change !== 0){


        el.innerHTML =
        `<span style="font-weight:700">
        ${sign}${change}
        </span> — ${reason}`;


    }

    else{


        el.textContent =
        reason;


    }


}





// ===============================
// Send Message
// ===============================


async function sendMessage(){


const input =
document.getElementById(
"message"
);


const btn =
document.getElementById(
"sendBtn"
);


const portrait =
document.getElementById(
"portrait"
);


const badge =
document.getElementById(
"emotionBadge"
);



const text =
input.value.trim();



if(!text)
return;



addBubble(
text,
"player"
);



input.value="";


btn.disabled=true;




// thinking image


const n =
Math.floor(
Math.random()*19
)+1;



portrait.src =
`images/thinking${n}.jpg`;


badge.textContent =
"thinking...";




// typing bubble


const typing =
document.createElement(
"div"
);


typing.className =
"bubble mathew";


typing.textContent =
"...";


typing.id =
"typing";



document
.getElementById("chat")
.appendChild(
typing
);



try{


let state =
getGameState();



const res =
await fetch(

"https://textbook-choices-marco-simpson.trycloudflare.com/chat",

{


method:"POST",


headers:{


"Content-Type":
"application/json"

},


body:JSON.stringify({

message:text,


state:state


})


}

);




const data =
await res.json();




document
.getElementById(
"typing"
)
?.remove();




addBubble(
data.reply,
"mathew"
);




// update browser memory


state.affection =
data.affection;



state.memories =
data.memories;



addToHistory(
text,
data.reply
);



saveGameState(
state
);




updateMeter(
data.affection
);


updateEmotion(
data.emotion
);



showReason(
data.change,
data.reason
);



}


catch(err){


console.log(err);


document
.getElementById(
"typing"
)
?.remove();



addBubble(
"Connection error",
"system"
);


badge.textContent =
"default";


portrait.src =
"images/default.jpg";


}



btn.disabled=false;

input.focus();


}





document
.getElementById("message")
.addEventListener(
"keydown",
(e)=>{

if(e.key==="Enter")
sendMessage();

}

);


// load saved affection on startup

const startState =
getGameState();


updateMeter(
startState.affection
);


</script>
</body>
</html>
